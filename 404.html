<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — Papiro Tático</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎖</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito Sans', sans-serif;
      background: #0f1e35;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .container { max-width: 480px; }
    .icon { font-size: 72px; margin-bottom: 24px; }
    .code { font-size: 80px; font-weight: 900; color: #1d4ed8; letter-spacing: -2px; line-height: 1; margin-bottom: 12px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    p { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.6; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: #1d4ed8;
      color: #fff;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      transition: background .15s;
    }
    .btn:hover { background: #1e40af; }
    .brand { margin-top: 40px; font-size: 12px; color: rgba(255,255,255,0.25); letter-spacing: 2px; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🎖</div>
    <div class="code">404</div>
    <h1>Página não encontrada</h1>
    <p>A página que você está procurando não existe ou foi movida.<br>Volte para o início e continue seus estudos, Steve!</p>
    <a href="/" class="btn">← Voltar ao início</a>
    <div class="brand">Papiro Tático · Estude com Estratégia</div>
  </div>
</body>
</html>
